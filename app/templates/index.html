<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowDesk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Workspace">
        <div class="brand">
          <span class="brand-mark">F</span>
          <div>
            <strong>FlowDesk</strong>
            <span>Support Console</span>
          </div>
        </div>

        <nav class="nav-tabs" aria-label="Views">
          <button class="nav-tab is-active" data-tab="tickets" type="button">
            Tickets
          </button>
          <button class="nav-tab" data-tab="users" type="button">Users</button>
        </nav>

        <section class="status-panel" aria-live="polite">
          <span class="status-dot" id="health-dot"></span>
          <div>
            <strong id="health-label">Checking API</strong>
            <span id="health-detail">Waiting for /health</span>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Operations</p>
            <h1>Ticket Desk</h1>
          </div>
          <div class="actions">
            <button class="button subtle" id="refresh-btn" type="button">
              Refresh
            </button>
            <a class="button ghost" href="/swagger/" target="_blank" rel="noreferrer">
              Swagger
            </a>
          </div>
        </header>

        <section class="metrics" aria-label="Ticket metrics">
          <div class="metric">
            <span>Open</span>
            <strong id="metric-open">0</strong>
          </div>
          <div class="metric">
            <span>In Progress</span>
            <strong id="metric-progress">0</strong>
          </div>
          <div class="metric">
            <span>Closed</span>
            <strong id="metric-closed">0</strong>
          </div>
          <div class="metric">
            <span>Users</span>
            <strong id="metric-users">0</strong>
          </div>
        </section>

        <section class="view is-active" id="tickets-view">
          <div class="split-layout">
            <section class="panel">
              <div class="panel-header">
                <div>
                  <h2>Create Ticket</h2>
                  <p>Route work to agents with priority and tags.</p>
                </div>
              </div>

              <form class="form-grid" id="ticket-form">
                <label>
                  Title
                  <input name="title" minlength="3" required />
                </label>
                <label>
                  Description
                  <textarea name="description" minlength="10" required></textarea>
                </label>
                <div class="form-row">
                  <label>
                    Creator
                    <select name="creator_id" id="ticket-creator" required></select>
                  </label>
                  <label>
                    Priority
                    <select name="priority">
                      <option value="low">Low</option>
                      <option value="medium" selected>Medium</option>
                      <option value="high">High</option>
                      <option value="critical">Critical</option>
                    </select>
                  </label>
                </div>
                <label>
                  Tags
                  <input name="tags" placeholder="bug, auth, production" />
                </label>
                <button class="button primary" type="submit">Create Ticket</button>
              </form>
            </section>

            <section class="panel list-panel">
              <div class="panel-header">
                <div>
                  <h2>Tickets</h2>
                  <p id="ticket-count">0 records</p>
                </div>
                <div class="search-row">
                  <input id="ticket-search" placeholder="Search tickets" />
                  <button class="button subtle" id="search-btn" type="button">
                    Search
                  </button>
                </div>
              </div>
              <div class="ticket-list" id="ticket-list"></div>
            </section>
          </div>
        </section>

        <section class="view" id="users-view">
          <div class="split-layout">
            <section class="panel">
              <div class="panel-header">
                <div>
                  <h2>Create User</h2>
                  <p>Add agents, admins, and customers.</p>
                </div>
              </div>

              <form class="form-grid" id="user-form">
                <label>
                  Email
                  <input name="email" type="email" required />
                </label>
                <label>
                  Full Name
                  <input name="full_name" required />
                </label>
                <label>
                  Role
                  <select name="role">
                    <option value="customer">Customer</option>
                    <option value="agent" selected>Agent</option>
                    <option value="admin">Admin</option>
                  </select>
                </label>
                <button class="button primary" type="submit">Create User</button>
              </form>
            </section>

            <section class="panel list-panel">
              <div class="panel-header">
                <div>
                  <h2>Users</h2>
                  <p id="user-count">0 records</p>
                </div>
              </div>
              <div class="user-list" id="user-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
