# FlowDesk — Full Stack Docker Compose
# Levanta todo el sistema con: docker-compose up -d

services:
  # ─── API Server ───────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "0"
      SECRET_KEY: flowdesk-docker-secret-key
      DATABASE_URL: postgresql://flowdesk:flowdesk_secret@db:5432/flowdesk_db
      REDIS_URL: redis://cache:6379/0
      ELASTICSEARCH_URL: http://search:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: flowdesk-attachments
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      search:
        condition: service_started
      kafka:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # ─── Kafka Notification Consumer ──────────────────
  notification-consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "app.infrastructure.messaging.kafka_consumers"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://flowdesk:flowdesk_secret@db:5432/flowdesk_db
      REDIS_URL: redis://cache:6379/0
      ELASTICSEARCH_URL: http://search:9200
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  # ─── Kafka Audit Consumer ────────────────────────
  audit-consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "app.infrastructure.messaging.kafka_consumers", "audit"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://flowdesk:flowdesk_secret@db:5432/flowdesk_db
      REDIS_URL: redis://cache:6379/0
      ELASTICSEARCH_URL: http://search:9200
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowdesk_db
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdesk -d flowdesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Elasticsearch ───────────────────────────────
  search:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Kafka (KRaft mode, no Zookeeper) ────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ───────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:
  kafka_data:
  minio_data:
